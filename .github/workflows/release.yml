name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package.json', 'app.json', 'package-lock.json') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Remove Gradle signing from release build
        run: |
          python3 - << 'EOF'
          import re
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          # Target only the signingConfig in the release block:
          # it's the only one immediately followed by shrinkResources
          content = re.sub(
              r'signingConfig signingConfigs\.debug(\s+shrinkResources)',
              r'// signingConfig handled post-build\1',
              content
          )
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print('Done')
          EOF

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Build unsigned release APK
        run: cd android && ./gradlew assembleRelease

      - name: Sign release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          CLEAN_PASS=$(printf '%s' "$KEYSTORE_PASSWORD" | tr -d '\r\n')
          CLEAN_ALIAS=$(printf '%s' "$KEY_ALIAS" | tr -d '\r\n')
          CLEAN_KEY_PASS=$(printf '%s' "$KEY_PASSWORD" | tr -d '\r\n')
          echo "Keystore size: $(wc -c < mutt-logbook.keystore) bytes"
          echo "Password length: ${#CLEAN_PASS}"
          echo "Alias length: ${#CLEAN_ALIAS}"
          keytool -list -keystore mutt-logbook.keystore -storepass "$CLEAN_PASS" -storetype JKS -v 2>&1 | head -20
          APKSIGNER="${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/apksigner"
          "$APKSIGNER" sign \
            --ks mutt-logbook.keystore \
            --ks-pass "pass:$CLEAN_PASS" \
            --ks-key-alias "$CLEAN_ALIAS" \
            --key-pass "pass:$CLEAN_KEY_PASS" \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Prepare artifacts
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            "mutt-logbook-${{ github.ref_name }}-debug.apk"
          cp android/app/build/outputs/apk/release/app-release-signed.apk \
            "mutt-logbook-${{ github.ref_name }}-release.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mutt Logbook ${{ github.ref_name }}"
          body: |
            ## Mutt Logbook ${{ github.ref_name }}

            **Installation:** Download an APK and sideload on Android.
            Enable "Install from unknown sources" in device settings first.

            - `*-release.apk` — signed release build
            - `*-debug.apk` — debug build (larger, includes dev tools)
          files: |
            mutt-logbook-${{ github.ref_name }}-debug.apk
            mutt-logbook-${{ github.ref_name }}-release.apk
          draft: false
          prerelease: false
