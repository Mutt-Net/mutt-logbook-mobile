name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@16

      - name: Build APK via EAS
        id: eas_build
        run: |
          BUILD_ID=$(eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --json \
            --no-wait | jq -r '.[0].id')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Wait for build and get APK URL
        id: get_apk
        run: |
          BUILD_ID=${{ steps.eas_build.outputs.build_id }}
          APK_URL=$(eas build:view "$BUILD_ID" --json | jq -r '.artifacts.buildUrl')
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK
        run: |
          curl -L "${{ steps.get_apk.outputs.apk_url }}" \
            -o "mutt-logbook-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mutt Logbook ${{ github.ref_name }}"
          body: |
            ## Mutt Logbook ${{ github.ref_name }}

            **Installation:** Download the APK and sideload on Android.
            Enable "Install from unknown sources" in device settings first.

            Built automatically via EAS Build.
          files: "mutt-logbook-${{ github.ref_name }}.apk"
          draft: false
          prerelease: false
