name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package.json', 'app.json', 'package-lock.json') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Patch build.gradle for release signing
        run: |
          python3 << 'PYEOF'
          with open('android/app/build.gradle', 'r') as f:
              c = f.read()
          c = c.replace(
              "    signingConfigs {\n        debug {\n            storeFile file('debug.keystore')\n            storePassword 'android'\n            keyAlias 'androiddebugkey'\n            keyPassword 'android'\n        }\n    }",
              "    signingConfigs {\n        debug {\n            storeFile file('debug.keystore')\n            storePassword 'android'\n            keyAlias 'androiddebugkey'\n            keyPassword 'android'\n        }\n        release {\n            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {\n                storeFile file(MYAPP_UPLOAD_STORE_FILE)\n                storePassword MYAPP_UPLOAD_STORE_PASSWORD\n                keyAlias MYAPP_UPLOAD_KEY_ALIAS\n                keyPassword MYAPP_UPLOAD_KEY_PASSWORD\n            }\n        }\n    }"
          )
          c = c.replace(
              '            signingConfig signingConfigs.debug\n            shrinkResources',
              '            signingConfig signingConfigs.release\n            shrinkResources'
          )
          with open('android/app/build.gradle', 'w') as f:
              f.write(c)
          print('Patched OK')
          PYEOF

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Setup release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          python3 -c "
          import base64, os, sys
          data = base64.b64decode(os.environ['KEYSTORE_BASE64'].strip())
          sys.stdout.buffer.write(data)
          " > android/app/mutt-logbook.keystore
          CLEAN_PASS=$(printf '%s' "$KEYSTORE_PASSWORD" | tr -d '\r\n')
          CLEAN_ALIAS=$(printf '%s' "$KEY_ALIAS" | tr -d '\r\n')
          CLEAN_KEY_PASS=$(printf '%s' "$KEY_PASSWORD" | tr -d '\r\n')
          keytool -list -keystore android/app/mutt-logbook.keystore -storepass "$CLEAN_PASS" 2>&1 || echo "KEYSTORE VALIDATION FAILED"
          {
            printf 'MYAPP_UPLOAD_STORE_FILE=mutt-logbook.keystore\n'
            printf 'MYAPP_UPLOAD_STORE_PASSWORD=%s\n' "$CLEAN_PASS"
            printf 'MYAPP_UPLOAD_KEY_ALIAS=%s\n' "$CLEAN_ALIAS"
            printf 'MYAPP_UPLOAD_KEY_PASSWORD=%s\n' "$CLEAN_KEY_PASS"
          } >> android/gradle.properties

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease

      - name: Prepare artifacts
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            "mutt-logbook-${{ github.ref_name }}-debug.apk"
          cp android/app/build/outputs/apk/release/app-release.apk \
            "mutt-logbook-${{ github.ref_name }}-release.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mutt Logbook ${{ github.ref_name }}"
          body: |
            ## Mutt Logbook ${{ github.ref_name }}

            **Installation:** Download an APK and sideload on Android.
            Enable "Install from unknown sources" in device settings first.

            - `*-release.apk` — signed release build
            - `*-debug.apk` — debug build (larger, includes dev tools)
          files: |
            mutt-logbook-${{ github.ref_name }}-debug.apk
            mutt-logbook-${{ github.ref_name }}-release.apk
          draft: false
          prerelease: false
